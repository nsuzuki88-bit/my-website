<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員登録連携</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
        }
        .loader {
            border-top-color: #06c755;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800">

    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-lg overflow-hidden relative">
        
        <!-- ヘッダー -->
        <div class="bg-[#06c755] p-6 text-center text-white">
            <h1 class="text-xl font-bold">会員登録</h1>
            <p class="text-sm opacity-90 mt-1">ショップカード連携のために<br>お名前を教えてください</p>
        </div>

        <!-- 読み込み中表示 -->
        <div id="loading" class="flex flex-col items-center justify-center py-20 px-6 text-center">
            <div id="loading-spinner" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p id="loading-text" class="text-gray-500 text-sm">LINEログイン中...</p>
        </div>

        <!-- 登録フォーム -->
        <div id="form-container" class="hidden p-6">
            <form id="registrationForm" class="space-y-6">
                <!-- LINE情報表示エリア（読み取り専用） -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-100 flex items-center space-x-3">
                    <img id="userPicture" src="" alt="Profile" class="w-10 h-10 rounded-full bg-gray-300 object-cover hidden">
                    <div>
                        <p class="text-xs text-gray-400">LINEアカウント</p>
                        <p id="lineDisplayName" class="font-bold text-gray-700">取得中...</p>
                    </div>
                </div>

                <div>
                    <label for="realName" class="block text-sm font-medium text-gray-700 mb-1">お名前 (フルネーム)</label>
                    <input type="text" id="realName" name="realName" required placeholder="例：山田 太郎"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#06c755] focus:border-transparent outline-none transition-colors">
                    <p class="text-xs text-gray-500 mt-1">※顧客管理のために使用されます</p>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-[#06c755] hover:bg-[#05b34d] text-white font-bold py-4 rounded-lg shadow-md transition-transform transform active:scale-95 flex justify-center items-center">
                    <span>登録してショップカードへ</span>
                </button>
            </form>
        </div>

        <!-- 完了画面 -->
        <div id="complete-container" class="hidden p-6 text-center pt-10">
            <div class="w-16 h-16 bg-green-100 text-[#06c755] rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">登録完了！</h2>
            <p class="text-gray-600 mb-8">ありがとうございました。<br>ショップカードをご利用いただけます。</p>
            
            <a id="shopCardLink" href="#" target="_blank"
                class="block w-full bg-gray-800 text-white font-bold py-4 rounded-lg shadow-md hover:bg-gray-700 transition-colors">
                ショップカードを開く
            </a>
        </div>

    </div>

    <script>
        // ==========================================
        // 設定エリア (ここを書き換えてください)
        // ==========================================
        
        // 1. LINE Developersコンソールで取得したLIFF ID
        const MY_LIFF_ID = "2009010005-liWeUjh7"; 

        // 2. Google Apps ScriptのウェブアプリURL
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxKjjFQIjnsOrMji2SR9LGAXreqm2tB2py2ho8GTSWFEKWuupQh5QOxeH4ASFkqhI2t/exec";

        // 3. ショップカードのURL (LINE公式アカウントの管理画面から取得)
        // 例: https://lin.ee/xxxxxxx
        const SHOP_CARD_URL = "https://lin.ee/example";

        // ==========================================
        // アプリケーションロジック
        // ==========================================

        const loadingEl = document.getElementById('loading');
        const loadingSpinnerEl = document.getElementById('loading-spinner');
        const loadingTextEl = document.getElementById('loading-text');
        const formContainerEl = document.getElementById('form-container');
        const completeContainerEl = document.getElementById('complete-container');
        const userPictureEl = document.getElementById('userPicture');
        const lineDisplayNameEl = document.getElementById('lineDisplayName');
        const shopCardLinkEl = document.getElementById('shopCardLink');
        const submitBtn = document.getElementById('submitBtn');

        let lineProfile = null;

        // 初期化処理
        window.onload = async function() {
            // エラー回避: LIFF IDが初期値のままの場合は処理を止めて警告を表示
            if (MY_LIFF_ID === "2009010005-liWeUjh7") {
                if(loadingSpinnerEl) loadingSpinnerEl.style.display = 'none';
                loadingTextEl.innerHTML = '<span class="text-red-500 font-bold text-base block mb-2">⚠️ 準備が完了していません</span>コード内の <code>MY_LIFF_ID</code> を、LINE Developersコンソールで取得した実際のLIFF IDに書き換えてください。';
                return;
            }

            try {
                // LIFF初期化
                await liff.init({ liffId: MY_LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // プロフィール取得
                lineProfile = await liff.getProfile();
                
                // 画面への反映
                lineDisplayNameEl.textContent = lineProfile.displayName;
                if (lineProfile.pictureUrl) {
                    userPictureEl.src = lineProfile.pictureUrl;
                    userPictureEl.classList.remove('hidden');
                }

                // ローディング終了、フォーム表示
                loadingEl.classList.add('hidden');
                formContainerEl.classList.remove('hidden');

            } catch (err) {
                console.error('LIFF Init Error', err);
                if(loadingSpinnerEl) loadingSpinnerEl.style.display = 'none';
                loadingTextEl.innerHTML = '<span class="text-red-500">LINEとの連携に失敗しました。</span><br><span class="text-xs text-gray-400 mt-2 block">エラー: ' + err.message + '</span>';
            }
        };

        // 送信処理
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!lineProfile) return;

            const realName = document.getElementById('realName').value;
            
            // ボタンをローディング状態に
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 処理中...';

            try {
                const data = {
                    userId: lineProfile.userId,
                    displayName: lineProfile.displayName,
                    realName: realName
                };

                await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 重要: GASへの直接POST用
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                // 完了画面へ遷移
                formContainerEl.classList.add('hidden');
                completeContainerEl.classList.remove('hidden');
                
                // ショップカードのリンクを設定
                shopCardLinkEl.href = SHOP_CARD_URL;

            } catch (error) {
                console.error('Submit Error', error);
                alert('登録に失敗しました。もう一度お試しください。');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });
    </script>
</body>
</html>
